  <rect width="980" height="500" rx="18" fill="#0d1117"/>
  <rect x="0" y="0" width="980" height="46" rx="18" fill="#161b22"/>
  <circle cx="28" cy="23" r="7" fill="#ff5f56"/>
  <circle cx="52" cy="23" r="7" fill="#ffbd2e"/>
  <circle cx="76" cy="23" r="7" fill="#27c93f"/>
  <text x="490" y="30" text-anchor="middle" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="15">python main.py</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#c9d1d9">
    <text x="42" y="92">==================================================</text>
